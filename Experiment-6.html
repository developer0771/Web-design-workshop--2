<!DOCTYPE html>
<html>
<head>
<title>JavaScript Events Demo</title>

<style>
body{
    font-family: Arial;
    background: white;
    text-align:center;
}

.container{
    background:white;
    width:720px;
    margin:100px auto;
    padding:40px;
    border-radius:10px;
    box-shadow:0px 0px 10px gray;
}

button{
    background:#4da6ff;
    color:white;
    border:none;
    padding:8px 12px;
    margin:5px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#2d89ef;
}
</style>

</head>

<body>

<div class="container">

<h2 id="heading">Welcome to JavaScriptLab</h2>

<input type="text" id="inputText" placeholder="Enter new heading">

<br><br>

<button onclick="changeHeading()">Change Heading</button>
<button onclick="changeBackground()">Change Background</button>
<button onclick="increaseFont()">Increase Font Size</button>
<br>
<button onclick="togglePara()">Show/Hide Paragraph</button>
<button onclick="resetPage()">Reset</button>

<p id="para" style="font-size:16px;">
This is a sample paragraph. JavaScript events can dynamically change content.
</p>

</div>

<script>

/* ── Background cycling ── */
var bgColors = [
    "white",
    "linear-gradient(to right, #b9fbc0, #98f5e1)",
    "lightblue",
    "linear-gradient(to right, #ffd6e0, #ffef9f)",
    "linear-gradient(to right, #c3cfe2, #f5f7fa)",
    "lightyellow",
    "lavender"
];
var bgIndex = 0;   // starts at white (index 0)

function changeBackground(){
    bgIndex = (bgIndex + 1) % bgColors.length;
    var next = bgColors[bgIndex];
    /* gradient values need to go via 'background', plain colours via 'backgroundColor' */
    if(next.startsWith("linear-gradient")){
        document.body.style.background = next;
    } else {
        document.body.style.background = next;
    }
}

/* ── Font size (starts at 16px, +2 on every click) ── */
var currentFontSize = 16;

function increaseFont(){
    currentFontSize += 2;
    document.getElementById("para").style.fontSize = currentFontSize + "px";
}

/* ── Other functions ── */
function changeHeading(){
    var text = document.getElementById("inputText").value;
    document.getElementById("heading").innerHTML = text;
}

function togglePara(){
    var p = document.getElementById("para");
    if(p.style.display === "none"){
        p.style.display = "block";
    } else {
        p.style.display = "none";
    }
}

function resetPage(){
    location.reload();
}

</script>

</body>
</html>
