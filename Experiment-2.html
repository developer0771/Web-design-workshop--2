<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Using Bootstrap UI Components for Web Page Design</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <style>
    body {
      background: #ffffff;
      color: #1f2933;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      padding: 30px 12px;
    }

    .store-frame {
      background: #f8f9fa;
      border: 2px solid #111111;
      margin: 0 auto;
      max-width: 700px;
      width: 100%;
    }

    .navbar {
      min-height: 41px;
      padding: 0;
    }

    .navbar .container {
      max-width: 570px;
    }

    .navbar-brand {
      font-size: 0.78rem;
      font-weight: 700;
    }

    .nav-link {
      font-size: 0.58rem;
      font-weight: 500;
      padding-left: 0.38rem;
      padding-right: 0.38rem;
    }

    .products {
      background: #f8f9fa;
      min-height: 324px;
      padding: 31px 0 47px;
    }

    .products .container {
      max-width: 570px;
    }

    .product-card {
      border: 1px solid #d7dde3;
      border-radius: 4px;
      height: 246px;
      overflow: hidden;
    }

    .product-card img {
      background: #ffffff;
      height: 137px;
      object-fit: contain;
      padding: 10px 8px 3px;
      width: 100%;
    }

    .card-body {
      padding: 0 9px 12px;
    }

    .card-title {
      color: #111111;
      font-size: 0.8rem;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .card-text {
      color: #4b5563;
      font-size: 0.58rem;
      line-height: 1.35;
      margin-bottom: 10px;
    }

    .price-row {
      align-items: center;
      display: flex;
      gap: 4px;
      margin-bottom: 8px;
    }

    .price {
      color: #111111;
      font-size: 0.62rem;
      font-weight: 700;
    }

    .badge {
      border-radius: 4px;
      font-size: 0.48rem;
      padding: 0.3em 0.45em;
    }

    .btn-primary {
      border-radius: 4px;
      font-size: 0.67rem;
      padding: 4px 8px;
    }

    footer {
      background: #212529;
      color: #ffffff;
      font-size: 0.62rem;
      padding: 11px 12px;
      text-align: center;
    }

    @media (max-width: 575.98px) {
      body {
        padding: 12px;
      }

      .products {
        padding: 28px 0 42px;
      }

      .product-card {
        height: auto;
      }
    }
  </style>
</head>
<body>
  <div class="store-frame">
    <nav class="navbar navbar-expand-md navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="#">TechStore</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#techStoreNavbar"
          aria-controls="techStoreNavbar"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="techStoreNavbar">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="#">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#products">Products</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Contact</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="products" id="products">
      <div class="container">
        <div class="row g-3 justify-content-center">
          <div class="col-sm-12 col-md-4">
          <div class="card product-card">
            <img
              src="assets/experiment-2/laptop.png"
              class="card-img-top"
              alt="Laptop"
            >
            <div class="card-body">
              <h2 class="card-title">Laptop</h2>
              <p class="card-text">High performance laptop</p>
              <div class="price-row">
                <span class="price">₹50,000</span>
                <span class="badge text-bg-success">New</span>
              </div>
              <button
                type="button"
                class="btn btn-primary"
                data-bs-toggle="modal"
                data-bs-target="#productModal"
                data-product="Laptop"
                data-description="A high performance laptop for study, coding, and professional work."
                data-price="₹50,000"
              >
                View Details
              </button>
            </div>
          </div>
        </div>

          <div class="col-sm-12 col-md-4">
          <div class="card product-card">
            <img
              src="assets/experiment-2/mobile.png"
              class="card-img-top"
              alt="Mobile"
            >
            <div class="card-body">
              <h2 class="card-title">Mobile</h2>
              <p class="card-text">Latest smartphone</p>
              <div class="price-row">
                <span class="price">₹30,000</span>
                <span class="badge text-bg-danger">Sale</span>
              </div>
              <button
                type="button"
                class="btn btn-primary"
                data-bs-toggle="modal"
                data-bs-target="#productModal"
                data-product="Mobile"
                data-description="A latest smartphone with a clear display, fast processor, and modern design."
                data-price="₹30,000"
              >
                View Details
              </button>
            </div>
          </div>
        </div>

          <div class="col-sm-12 col-md-4">
          <div class="card product-card">
            <img
              src="assets/experiment-2/headphones.png"
              class="card-img-top"
              alt="Headphones"
            >
            <div class="card-body">
              <h2 class="card-title">Headphones</h2>
              <p class="card-text">Noise cancelling</p>
              <div class="price-row">
                <span class="price">₹5,000</span>
                <span class="badge text-bg-success">New</span>
              </div>
              <button
                type="button"
                class="btn btn-primary"
                data-bs-toggle="modal"
                data-bs-target="#productModal"
                data-product="Headphones"
                data-description="Comfortable noise cancelling headphones for music, calls, and online classes."
                data-price="₹5,000"
              >
                View Details
              </button>
            </div>
          </div>
        </div>
      </div>
      </div>
    </main>

    <footer>
      &copy; 2026 TechStore | Follow us on social media
    </footer>
  </div>

  <div
    class="modal fade"
    id="productModal"
    tabindex="-1"
    aria-labelledby="productModalLabel"
    aria-hidden="true"
  >
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title fs-5" id="productModalLabel">Product Details</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p id="productDescription" class="mb-2"></p>
          <p class="mb-0">
            <strong>Price:</strong>
            <span id="productPrice"></span>
          </p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const productModal = document.getElementById('productModal');

    productModal.addEventListener('show.bs.modal', function (event) {
      const button = event.relatedTarget;
      const product = button.getAttribute('data-product');
      const description = button.getAttribute('data-description');
      const price = button.getAttribute('data-price');

      document.getElementById('productModalLabel').textContent = product + ' Details';
      document.getElementById('productDescription').textContent = description;
      document.getElementById('productPrice').textContent = price;
    });
  </script>
</body>
</html>
