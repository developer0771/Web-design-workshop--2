<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fetching API Data using useEffect</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: Arial, sans-serif;
  }

  .page {
    min-height: 100vh;
    background: #f7f7f7;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 26px;
  }

  .card {
    width: min(100%, 460px);
    background: #ffffff;
    border-radius: 8px;
    padding: 38px 28px 28px;
    text-align: center;
    box-shadow: 0 0 16px rgba(0, 0, 0, 0.24);
  }

  h1 {
    font-size: 1.8rem;
    color: #000000;
    margin-bottom: 30px;
  }

  form {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .field {
    width: 100%;
    max-width: 380px;
    margin-bottom: 20px;
    text-align: left;
  }

  input {
    width: 100%;
    height: 40px;
    border: 1px solid #7c7c7c;
    padding: 8px 10px;
    font-size: 0.95rem;
    outline: none;
  }

  input:focus {
    border-color: #008000;
  }

  button {
    background: #008000;
    color: #ffffff;
    border: none;
    padding: 11px 18px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 6px;
  }

  button:hover {
    background: #006c00;
  }

  .error {
    color: #c40000;
    font-size: 0.82rem;
    margin-top: 6px;
  }

  .success {
    color: #008000;
    font-size: 1rem;
    font-weight: 800;
    margin: 18px 0;
  }

  .users-box {
    background: #eaf8ea;
    width: 100%;
    max-width: 380px;
    margin: 20px auto 0;
    padding: 24px 20px;
    text-align: center;
  }

  h2 {
    font-size: 1.25rem;
    color: #000000;
    margin-bottom: 16px;
  }

  ul {
    text-align: left;
    padding-left: 22px;
  }

  li {
    font-size: 0.95rem;
    margin-bottom: 10px;
    line-height: 1.4;
  }

  li:last-child {
    margin-bottom: 0;
  }

  .status {
    color: #333333;
    font-size: 0.9rem;
  }

  .api-error {
    text-align: center;
  }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
  const { useEffect, useState } = React;

  const initialForm = {
    name: '',
    email: '',
    password: '',
  };

  function App() {
    const [formData, setFormData] = useState(initialForm);
    const [errors, setErrors] = useState({});
    const [registeredUsers, setRegisteredUsers] = useState([]);
    const [apiUsers, setApiUsers] = useState([]);
    const [loading, setLoading] = useState(true);
    const [apiError, setApiError] = useState('');
    const [success, setSuccess] = useState(false);

    useEffect(() => {
      let isMounted = true;

      async function fetchUsers() {
        try {
          const response = await fetch('https://jsonplaceholder.typicode.com/users');

          if (!response.ok) {
            throw new Error('Unable to fetch user data');
          }

          const data = await response.json();
          const users = data.slice(0, 5).map((user) => ({
            id: `api-${user.id}`,
            name: user.name,
            email: user.email,
          }));

          if (isMounted) {
            setApiUsers(users);
            setApiError('');
          }
        } catch (error) {
          if (isMounted) {
            setApiError(error.message);
          }
        } finally {
          if (isMounted) {
            setLoading(false);
          }
        }
      }

      fetchUsers();

      return () => {
        isMounted = false;
      };
    }, []);

    const validate = () => {
      const newErrors = {};
      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (!formData.name.trim()) {
        newErrors.name = 'Name is required';
      } else if (formData.name.trim().length < 3) {
        newErrors.name = 'Name must contain at least 3 characters';
      }

      if (!formData.email.trim()) {
        newErrors.email = 'Email is required';
      } else if (!emailPattern.test(formData.email)) {
        newErrors.email = 'Enter a valid email address';
      }

      if (!formData.password) {
        newErrors.password = 'Password is required';
      } else if (formData.password.length < 6) {
        newErrors.password = 'Password must contain at least 6 characters';
      }

      return newErrors;
    };

    const handleChange = (event) => {
      const { name, value } = event.target;

      setFormData({
        ...formData,
        [name]: value,
      });

      if (errors[name]) {
        setErrors({
          ...errors,
          [name]: '',
        });
      }

      setSuccess(false);
    };

    const handleSubmit = (event) => {
      event.preventDefault();

      const validationErrors = validate();

      if (Object.values(validationErrors).some(Boolean)) {
        setErrors(validationErrors);
        setSuccess(false);
        return;
      }

      setRegisteredUsers([
        {
          id: Date.now(),
          name: formData.name.trim(),
          email: formData.email.trim(),
        },
        ...registeredUsers,
      ]);
      setFormData(initialForm);
      setErrors({});
      setSuccess(true);
    };

    const displayedUsers = [...registeredUsers, ...apiUsers];

    return (
      <div className="page">
        <div className="card">
          <h1>Registration Form</h1>

          <form onSubmit={handleSubmit} noValidate>
            <div className="field">
              <input
                type="text"
                name="name"
                value={formData.name}
                onChange={handleChange}
                placeholder="Enter Name"
                aria-label="Name"
              />
              {errors.name && <p className="error">{errors.name}</p>}
            </div>

            <div className="field">
              <input
                type="email"
                name="email"
                value={formData.email}
                onChange={handleChange}
                placeholder="Enter Email"
                aria-label="Email"
              />
              {errors.email && <p className="error">{errors.email}</p>}
            </div>

            <div className="field">
              <input
                type="password"
                name="password"
                value={formData.password}
                onChange={handleChange}
                placeholder="Enter Password"
                aria-label="Password"
              />
              {errors.password && <p className="error">{errors.password}</p>}
            </div>

            <button type="submit">Register</button>
          </form>

          {success && <p className="success">Registration Successful!</p>}

          <div className="users-box">
            <h2>Registered Users</h2>

            {loading && <p className="status">Fetching API users...</p>}
            {apiError && <p className="error api-error">{apiError}</p>}

            {!loading && displayedUsers.length > 0 && (
              <ul>
                {displayedUsers.map((user) => (
                  <li key={user.id}>
                    {user.name} - {user.email}
                  </li>
                ))}
              </ul>
            )}
          </div>
        </div>
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
