<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>React Counter App</title>

<!-- React + ReactDOM + Babel (no build step needed) -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: Arial, sans-serif;
    background: #f0f0f0;
  }

  .container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .card {
    background: #ffffff;
    border-radius: 20px;
    padding: 48px 64px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    border: 2px solid #ccc;
    min-width: 320px;
  }

  h1 {
    font-size: 1.9rem;
    font-weight: 800;
    color: #111;
    margin-bottom: 16px;
    line-height: 1.3;
  }

  .counter {
    font-size: 3.5rem;
    font-weight: 900;
    color: #111;
    margin: 16px 0 28px;
  }

  .buttons {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-bottom: 12px;
  }

  .btn {
    background: #1a73e8;
    color: #ffffff;
    border: none;
    padding: 10px 22px;
    border-radius: 6px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn:hover {
    background: #155ab6;
  }

  .reset-row {
    display: flex;
    justify-content: center;
  }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
  const { useState } = React;

  function App() {
    const [count, setCount] = useState(0);

    const increment = () => setCount(count + 1);
    const decrement = () => setCount(count - 1);
    const reset     = () => setCount(0);

    return (
      <div className="container">
        <div className="card">
          <h1>React Counter<br />Application</h1>
          <p className="counter">{count}</p>
          <div className="buttons">
            <button onClick={increment} className="btn">Increment (+)</button>
            <button onClick={decrement} className="btn">Decrement (-)</button>
          </div>
          <div className="reset-row">
            <button onClick={reset} className="btn">Reset</button>
          </div>
        </div>
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<App />);
</script>

</body>
</html>
